
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>@xyzsites | Follow Me</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #111215 0%, #0a0a0c 100%);
            min-height: 100vh;
            padding: 24px 16px;
            color: #eef2f5;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            background: #1c1d22;
            border-radius: 2rem;
            padding: 2rem 1.5rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid #2f3138;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: #b9d0f0;
            letter-spacing: -0.5px;
            margin-bottom: 0.5rem;
        }

        .header .tag {
            color: #8e929b;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
        }

        /* Social Grid - clean tiles */
        .social-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .social-tile {
            background: #141518;
            border-radius: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.85rem;
            padding: 1.1rem 0.8rem;
            text-decoration: none;
            transition: all 0.2s ease;
            border: 1px solid #2c2e36;
            color: #eef2f5;
        }

        .social-tile i {
            font-size: 1.8rem;
        }

        .social-tile span {
            font-size: 1rem;
            font-weight: 600;
        }

        .social-tile:active {
            transform: scale(0.97);
        }

        /* Hover effects desktop */
        @media (hover: hover) {
            .social-tile:hover {
                transform: translateY(-3px);
            }
            .social-tile.youtube:hover { background: #ff0000; border-color: #ff0000; color: white; }
            .social-tile.whatsapp:hover { background: #25d366; border-color: #25d366; color: white; }
            .social-tile.instagram:hover { background: linear-gradient(135deg, #833ab4, #fd1d1d, #fcb045); border-color: #fd1d1d; color: white; }
            .social-tile.facebook:hover { background: #1877f2; border-color: #1877f2; color: white; }
            .social-tile.twitter-x:hover { background: #000000; border-color: #ffffff; color: white; }
            .social-tile.github:hover { background: #2b2b2e; border-color: #6e5494; color: white; }
            .social-tile.tiktok:hover { background: #010101; border-color: #25f4ee; color: #25f4ee; }
            .social-tile.threads:hover { background: #000000; border-color: #e34ba9; color: #e34ba9; }
        }

        /* Footer */
        .footer {
            text-align: center;
            padding-top: 1.5rem;
            border-top: 1px solid #2a2c33;
            color: #6a6e78;
            font-size: 0.8rem;
        }

        .footer i {
            margin-right: 0.3rem;
        }

        /* Tablet and up */
        @media (min-width: 500px) {
            .social-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 1rem;
            }
        }

        @media (min-width: 650px) {
            .container {
                padding: 2.5rem;
            }
            .social-grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 1.2rem;
            }
            .social-tile {
                flex-direction: column;
                padding: 1.3rem 0.5rem;
                gap: 0.6rem;
            }
            .social-tile i {
                font-size: 2.2rem;
            }
            .social-tile span {
                font-size: 0.85rem;
            }
        }

        @media (min-width: 750px) {
            .social-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        /* Mobile small */
        @media (max-width: 420px) {
            .container {
                padding: 1.5rem 1rem;
            }
            .header h1 {
                font-size: 2rem;
            }
            .social-tile {
                padding: 0.85rem 0.5rem;
            }
            .social-tile i {
                font-size: 1.4rem;
            }
            .social-tile span {
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>@xyzsites</h1>
            <div class="tag">✦ follow & connect ✦</div>
        </div>

        <div class="social-grid">
            <!-- YouTube -->
            <a href="https://youtube.com/@xyzsites" target="_blank" class="social-tile youtube">
                <i class="fab fa-youtube"></i>
                <span>YouTube</span>
            </a>
            <!-- WhatsApp -->
            <a href="https://whatsapp.com/channel/0029VbBofGr3GJOyhycvgQ0T" target="_blank" class="social-tile whatsapp">
                <i class="fab fa-whatsapp"></i>
                <span>WhatsApp</span>
            </a>
            <!-- Instagram -->
            <a href="https://www.instagram.com/faizel.telkom?igsh=dTk1OWtuZmtseTZt" target="_blank" class="social-tile instagram">
                <i class="fab fa-instagram"></i>
                <span>Instagram</span>
            </a>
            <!-- Facebook -->
            <a href="https://www.facebook.com/faizel.isaacs.1610" target="_blank" class="social-tile facebook">
                <i class="fab fa-facebook"></i>
                <span>Facebook</span>
            </a>
            <!-- X (Twitter) - clean X logo -->
            <a href="https://twitter.com/xyzsites" target="_blank" class="social-tile twitter-x">
                <i class="fa-brands fa-x-twitter"></i>
                <span>X</span>
            </a>
            <!-- GitHub -->
            <a href="https://github.com/xyzsites" target="_blank" class="social-tile github">
                <i class="fab fa-github"></i>
                <span>GitHub</span>
            </a>
            <!-- TikTok - added -->
            <a href="https://tiktok.com/@xyzsites" target="_blank" class="social-tile tiktok">
                <i class="fab fa-tiktok"></i>
                <span>TikTok</span>
            </a>
            <!-- Threads - added -->
            <a href="https://www.threads.net/@xyzsites" target="_blank" class="social-tile threads">
                <i class="fa-brands fa-threads"></i>
                <span>Threads</span>
            </a>
        </div>

        <div class="footer">
            <i class="fas fa-link"></i> server@xyzsites
        </div>
    </div>
</body>
</html>
