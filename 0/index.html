<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>@xyzsites</title>
    <!-- Font Awesome 6 (Free) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #1a1b1e 0%, #0f0f11 100%);
            min-height: 100vh;
            padding: 8px;
            color: #e4e5e7;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(44, 45, 50, 0.95);
            backdrop-filter: blur(0px);
            border-radius: 28px;
            padding: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border: 1px solid rgba(62, 63, 68, 0.8);
        }

        h1 {
            font-size: 32px;
            margin-bottom: 24px;
            color: #9ab7d7;
            font-weight: 700;
            letter-spacing: 0.5px;
            padding-bottom: 16px;
            border-bottom: 3px solid #3e3f44;
            text-align: center;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        .folder-item {
            background: #222327;
            border-radius: 24px;
            transition: all 0.2s ease;
            border: 2px solid #3e3f44;
            overflow: hidden;
        }

        .folder-item:active {
            transform: scale(0.98);
        }

        .folder-link {
            display: flex;
            align-items: center;
            padding: 24px 28px;
            text-decoration: none;
            color: #e4e5e7;
            gap: 24px;
        }

        .folder-icon {
            font-size: 56px;
            min-width: 80px;
            text-align: center;
        }

        .folder-info {
            flex: 1;
        }

        .folder-name {
            font-size: 32px;
            font-weight: 700;
            color: #9ab7d7;
            margin-bottom: 12px;
            word-break: break-word;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .external-icon {
            font-size: 20px;
            opacity: 0.7;
        }

        .folder-meta {
            font-size: 20px;
            color: #8f9095;
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
        }

        .folder-meta span {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .folder-arrow {
            color: #6b8caf;
            font-size: 42px;
            font-weight: bold;
            transition: transform 0.2s ease;
        }

        .folder-item:active .folder-arrow {
            transform: translateX(8px);
        }

        /* Icons for different folder types */
        .icon-folder { color: #9ab7d7; }
        .icon-movies { color: #ff6b6b; }
        .icon-music { color: #4ecdc4; }
        .icon-pics { color: #feca57; }
        .icon-apks { color: #ff9ff3; }
        .icon-thikr { color: #54a0ff; }
        .icon-ghost { color: #6b6c71; opacity: 0.5; }

        .no-items {
            text-align: center;
            padding: 60px;
            background: #222327;
            border-radius: 24px;
            color: #8f9095;
            font-size: 20px;
            border: 2px dashed #3e3f44;
        }

        /* Footer Social Section */
        .footer-social {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 3px solid #3e3f44;
        }

        .footer-social h3 {
            font-size: 28px;
            margin-bottom: 20px;
            color: #9ab7d7;
            text-align: center;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .social-tiles {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }

        .tile {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 20px 12px;
            background: #222327;
            border-radius: 20px;
            text-decoration: none;
            transition: all 0.2s ease;
            border: 2px solid #3e3f44;
            color: #e4e5e7;
        }

        .tile i {
            font-size: 36px;
        }

        .tile span {
            font-size: 16px;
            font-weight: 600;
        }

        .tile:active {
            transform: scale(0.96);
        }

        /* Social tile colors */
        .tile.youtube:hover { background: #ff0000; border-color: #ff0000; color: white; }
        .tile.whatsapp:hover { background: #25d366; border-color: #25d366; color: white; }
        .tile.instagram:hover { background: linear-gradient(135deg, #833ab4, #fd1d1d, #fcb045); border-color: #fd1d1d; }
        .tile.facebook:hover { background: #1877f2; border-color: #1877f2; color: white; }
        .tile.x:hover { background: #000000; border-color: #ffffff; color: white; }
        .tile.github:hover { background: #333; border-color: #6e5494; color: white; }

        /* Social tile icons color */
        .tile.youtube i { color: #ff0000; }
        .tile.whatsapp i { color: #25d366; }
        .tile.instagram i { color: #fd1d1d; }
        .tile.facebook i { color: #1877f2; }
        .tile.x i { color: #ffffff; }
        .tile.github i { color: #6e5494; }
        
        .tile:hover i { color: white; }

        footer {
            text-align: center;
            font-size: 16px;
            color: #6b6c71;
            padding-top: 20px;
            font-weight: 500;
        }

        /* Desktop styles */
        @media (min-width: 768px) {
            body {
                padding: 40px;
            }

            .container {
                padding: 40px;
            }

            h1 {
                font-size: 48px;
                margin-bottom: 32px;
                text-align: left;
            }

            .grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 25px;
            }

            .folder-link {
                padding: 32px 36px;
                gap: 30px;
            }

            .folder-icon {
                font-size: 72px;
                min-width: 100px;
            }

            .folder-name {
                font-size: 42px;
                margin-bottom: 16px;
            }

            .external-icon {
                font-size: 28px;
            }

            .folder-meta {
                font-size: 24px;
                gap: 32px;
            }

            .folder-arrow {
                font-size: 56px;
            }

            .folder-item:hover {
                transform: translateY(-4px);
                border-color: #6b8caf;
                box-shadow: 0 10px 25px rgba(107, 140, 175, 0.3);
            }

            .folder-item:hover .folder-arrow {
                transform: translateX(10px);
            }

            .footer-social h3 {
                font-size: 32px;
                text-align: left;
            }

            .social-tiles {
                grid-template-columns: repeat(6, 1fr);
                gap: 20px;
            }

            .tile {
                padding: 24px 16px;
            }

            .tile i {
                font-size: 48px;
            }

            .tile span {
                font-size: 18px;
            }

            .tile:hover {
                transform: translateY(-5px);
            }
        }

        /* Small phones */
        @media (max-width: 480px) {
            .folder-link {
                padding: 18px 20px;
                gap: 16px;
            }
            
            .folder-icon {
                font-size: 44px;
                min-width: 60px;
            }
            
            .folder-name {
                font-size: 24px;
            }
            
            .external-icon {
                font-size: 16px;
            }
            
            .folder-meta {
                font-size: 14px;
                gap: 16px;
            }
            
            .folder-arrow {
                font-size: 32px;
            }
            
            .social-tiles {
                gap: 10px;
            }
            
            .tile {
                padding: 14px 8px;
            }
            
            .tile i {
                font-size: 28px;
            }
            
            .tile span {
                font-size: 12px;
            }
            
            .footer-social h3 {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>@xyzsites</h1>
        
        <!-- Footer with Follow Me Section -->
        <div class="footer-social">
            <h3>🌟 Follow Me</h3>
            <div class="social-tiles">
                <a href="https://youtube.com/@xyzsites" target="_blank" class="tile youtube" title="YouTube">
                    <i class="fab fa-youtube"></i>
                    <span>YouTube</span>
                </a>
                <a href="https://whatsapp.com/channel/0029VbBofGr3GJOyhycvgQ0T" target="_blank" class="tile whatsapp" title="WhatsApp">
                    <i class="fab fa-whatsapp"></i>
                    <span>WhatsApp</span>
                </a>
                <a href="https://www.instagram.com/faizel.telkom?igsh=dTk1OWtuZmtseTZt" target="_blank" class="tile instagram" title="Instagram">
                    <i class="fab fa-instagram"></i>
                    <span>Instagram</span>
                </a>
                <a href="https://www.facebook.com/faizel.isaacs.1610" target="_blank" class="tile facebook" title="Facebook">
                    <i class="fab fa-facebook"></i>
                    <span>Facebook</span>
                </a>
                <a href="https://twitter.com/YOUR_USER" target="_blank" class="tile x" title="Twitter / X">
                    <i class="fab fa-x-twitter"></i>
                    <span>X / Twitter</span>
                </a>
                <a href="https://github.com/YOUR_USER" target="_blank" class="tile github" title="GitHub">
                    <i class="fab fa-github"></i>
                    <span>GitHub</span>
                </a>
            </div>
            <footer>
                🔗 server@xyzsites
            </footer>
        </div>
    </div>
</body>
</html>
